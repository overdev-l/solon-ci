# Solon Electron 应用 — GitHub Actions 构建 + 发布
# 本仓库为空壳仓库，代码来自 GitLab 私有仓库
# 触发方式：GitLab CI 通过 Repository Dispatch API 触发
# 产物发布到本仓库的 GitHub Releases

name: Build & Deploy

on:
  repository_dispatch:
    types: [trigger-build]

env:
  TAG: ${{ github.event.client_payload.tag }}
  CHANNEL: ${{ github.event.client_payload.channel }}
  VERSION: ${{ github.event.client_payload.version }}

jobs:
  build-and-deploy:
    runs-on: macos-latest
    environment: GITLAB_PAT
    permissions:
      contents: write
    timeout-minutes: 60
    steps:
      # ---- 拉取私有代码 ----
      - name: Clone private repo
        env:
          GITLAB_PAT: ${{ secrets.GITLAB_PAT }}
        run: |
          git config --global credential.helper ''
          git clone --branch "$TAG" \
            "https://private-token:${GITLAB_PAT}@gitlab.com/project-basic-service/opcwork.git" \
            workspace
          cd workspace
          git fetch --tags

      # ---- 设置 Node.js ----
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ---- 安装依赖 ----
      - name: Install dependencies
        working-directory: workspace
        run: |
          NODE_ENV=development npm ci 2>&1 | tail -5
          # 安装插件依赖
          cd figma-plugin && npm ci 2>&1 | tail -3 && cd ..
          cd photoshop-plugin && npm ci 2>&1 | tail -3 && cd ..

      # ---- 构建 ----
      - name: Build plugins
        working-directory: workspace
        run: |
          echo "::group::构建 Figma 插件"
          cd figma-plugin && npm run build && cd ..
          echo "::endgroup::"
          echo "::group::构建 Photoshop 插件"
          cd photoshop-plugin && npm run build && cd ..
          echo "::endgroup::"

      - name: Build renderer
        working-directory: workspace
        run: |
          echo "::group::TypeScript & Vite 构建"
          ./node_modules/.bin/tsc && ./node_modules/.bin/vite build
          echo "::endgroup::"

      - name: Build Electron (macOS)
        working-directory: workspace
        run: |
          echo "::group::electron-builder"
          npx electron-builder --mac --publish never 2>&1 | tail -20
          echo "::endgroup::"
          echo "构建产物："
          ls -lh release/*.dmg release/*.zip release/*.blockmap release/latest-mac.yml 2>/dev/null || true

      # ---- 生成 Changelog ----
      - name: Generate changelog
        working-directory: workspace
        run: |
          # 获取上一个 tag（排除当前 tag）
          PREVIOUS_TAG=$(git tag --sort=-creatordate | grep -v "^${TAG}$" | head -n 1)
          echo "当前 tag: ${TAG}"
          echo "上一个 tag: ${PREVIOUS_TAG:-'(无)'}"

          if [ -z "$PREVIOUS_TAG" ]; then
            # 无上一个 tag，取所有 feat/fix commit
            CHANGELOG=$(git log --pretty=format:"- %s" "$TAG" | grep -E "^- (feat|fix)" || git log --pretty=format:"- %s" -20)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" "${PREVIOUS_TAG}..${TAG}" | grep -E "^- (feat|fix)" || git log --pretty=format:"- %s" "${PREVIOUS_TAG}..${TAG}")
          fi

          # 去除 chore 类型的 commit（如版本号升级）
          echo "$CHANGELOG" > changelog.txt
          echo "=== Changelog ==="
          cat changelog.txt

      # ---- 创建 GitHub Release 并上传产物 ----
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: "Solon v${{ env.VERSION }}"
          body_path: workspace/changelog.txt
          prerelease: ${{ env.CHANNEL == 'beta' }}
          files: |
            workspace/release/*.dmg
            workspace/release/*.zip
            workspace/release/*.blockmap
            workspace/release/latest-mac.yml


      # ---- 更新通道固定 Release（供 electron-updater 检查） ----
      - name: Update channel release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANNEL_TAG="update-${CHANNEL}"
          echo "通道 tag: ${CHANNEL_TAG}"

          # 检查固定 release 是否存在
          RELEASE_ID=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/overdev-l/solon-ci/releases/tags/${CHANNEL_TAG}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null)

          if [ -z "$RELEASE_ID" ]; then
            echo "创建固定 release: ${CHANNEL_TAG}"
            RELEASE_ID=$(curl -s -X POST -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"tag_name\":\"${CHANNEL_TAG}\",\"name\":\"${CHANNEL} channel (auto-update)\",\"body\":\"此 release 由 CI 自动维护，供 electron-updater 检查更新。\\n\\n当前版本: v${VERSION}\",\"prerelease\":false}" \
              "https://api.github.com/repos/overdev-l/solon-ci/releases" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          else
            echo "更新固定 release 描述"
            curl -s -X PATCH -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"body\":\"此 release 由 CI 自动维护，供 electron-updater 检查更新。\\n\\n当前版本: v${VERSION}\"}" \
              "https://api.github.com/repos/overdev-l/solon-ci/releases/${RELEASE_ID}" > /dev/null
          fi

          # 删除旧的 assets
          ASSETS=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/overdev-l/solon-ci/releases/${RELEASE_ID}/assets")
          echo "$ASSETS" | python3 -c "
import sys, json, urllib.request
assets = json.load(sys.stdin)
for a in assets:
    req = urllib.request.Request(a['url'], method='DELETE', headers={
        'Authorization': 'token ${GITHUB_TOKEN}',
    })
    urllib.request.urlopen(req)
    print(f'  删除旧 asset: {a["name"]}')
"

          # 上传新的 assets
          cd workspace/release
          for FILE in latest-mac.yml *.dmg *.zip *.blockmap; do
            [ -f "$FILE" ] || continue
            MIME="application/octet-stream"
            [[ "$FILE" == *.yml ]] && MIME="text/yaml"
            echo "  上传: ${FILE}"
            curl -s -X POST \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Content-Type: ${MIME}" \
              --data-binary "@${FILE}" \
              "https://uploads.github.com/repos/overdev-l/solon-ci/releases/${RELEASE_ID}/assets?name=${FILE}" > /dev/null
          done
          echo "✅ 通道 ${CHANNEL_TAG} 已更新到 v${VERSION}"

      # ---- 创建 GitLab Release ----
      - name: Create GitLab Release
        continue-on-error: true
        working-directory: workspace
        run: |
          DMG_FILE=$(basename $(ls release/*.dmg | head -n 1) 2>/dev/null || echo "Solon-${VERSION}.dmg")
          ZIP_FILE=$(basename $(ls release/*.zip | head -n 1) 2>/dev/null || echo "Solon-${VERSION}-mac.zip")
          DESCRIPTION=$(cat changelog.txt)
          GH_RELEASE_URL="https://github.com/overdev-l/solon-ci/releases/download/${TAG}"

          curl --fail --request POST \
            --header "PRIVATE-TOKEN: ${{ secrets.GITLAB_RELEASE_TOKEN }}" \
            --header "Content-Type: application/json" \
            --data "{
              \"name\": \"Solon v${VERSION}\",
              \"tag_name\": \"${TAG}\",
              \"description\": $(echo "$DESCRIPTION" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))'),
              \"assets\": {
                \"links\": [
                  {\"name\": \"macOS DMG\", \"url\": \"${GH_RELEASE_URL}/${DMG_FILE}\"},
                  {\"name\": \"macOS ZIP\", \"url\": \"${GH_RELEASE_URL}/${ZIP_FILE}\"}
                ]
              }
            }" \
            "https://gitlab.com/api/v4/projects/79942617/releases"
          echo "✅ GitLab Release 创建成功"

      # ---- 飞书通知 ----
      - name: Feishu notification
        continue-on-error: true
        working-directory: workspace
        run: |
          DMG_FILE=$(basename $(ls release/*.dmg | head -n 1) 2>/dev/null || echo "Solon-${VERSION}.dmg")
          GH_RELEASE_URL="https://github.com/overdev-l/solon-ci/releases/download/${TAG}"
          FEISHU_CONTENT=$(cat changelog.txt | sed 's/$/\\n/' | tr -d '\n')

          curl -s -X POST \
            "https://open.feishu.cn/open-apis/bot/v2/hook/d55b0ff3-12ed-416f-9523-28d8055cca46" \
            -H "Content-Type: application/json" \
            -d "{
              \"msg_type\": \"interactive\",
              \"card\": {
                \"header\": {
                  \"title\": {\"tag\": \"plain_text\", \"content\": \"🚀 Solon ${VERSION} 已发布\"},
                  \"template\": \"blue\"
                },
                \"elements\": [
                  {
                    \"tag\": \"markdown\",
                    \"content\": \"**版本号：** ${VERSION}\\n**通道：** ${CHANNEL}\\n\\n---\\n\\n**更新内容：**\\n${FEISHU_CONTENT}\"
                  },
                  {
                    \"tag\": \"action\",
                    \"actions\": [
                      {
                        \"tag\": \"button\",
                        \"text\": {\"tag\": \"plain_text\", \"content\": \"下载 DMG\"},
                        \"type\": \"primary\",
                        \"url\": \"${GH_RELEASE_URL}/${DMG_FILE}\"
                      }
                    ]
                  }
                ]
              }
            }"
          echo "✅ 飞书通知已发送"
